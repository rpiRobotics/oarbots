Section "ServerLayout"
    Identifier "HeadlessLayout"
    Screen 2 "Screen2"
EndSection

Section "Device"
    Identifier "DummyDevice"
    Driver "dummy"
    VideoRam 256000
EndSection

Section "Monitor"
    Identifier "DummyMonitor"
    HorizSync 30-80
    VertRefresh 50-75
EndSection

Section "Screen"
    Identifier "Screen2"
    Device "DummyDevice"
    Monitor "DummyMonitor"
    DefaultDepth 24

    SubSection "Display"
        Depth 24
        Virtual 1280 800
    EndSubSection
EndSection