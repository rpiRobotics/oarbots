name: CI
on:
  push:
  pull_request:

jobs:
  build_and_test_ros2:
    runs-on: ubuntu-24.04
    steps:
      - name: Setup ROS2 Jazzy Environment
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: jazzy

      - name: Checkout packages.repos
        uses: actions/checkout@v7
        with:
          sparse-checkout: |
            packages.repos
            scripts/install-azure-kinect-drivers.sh
          sparse-checkout-cone-mode: false

      - name: Download Azure Kinect packages
        run: /bin/bash $GITHUB_WORKSPACE/scripts/install-azure-kinect-drivers.sh
          
      - name: Install Azure Kinect packages
        run: sudo apt install -y ./*.deb

      - name: CI
        uses: ros-tooling/action-ros-ci@v0.4
        with:
          target-ros2-distro: jazzy
          vcs-repo-file-url: $GITHUB_WORKSPACE/packages.repos